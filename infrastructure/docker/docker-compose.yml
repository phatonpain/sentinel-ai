version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: sentinel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel
      POSTGRES_DB: sentinel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d sentinel"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sentinel-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api-proxy:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.api-proxy
    container_name: sentinel-api-proxy
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://sentinel:sentinel@postgres:5432/sentinel?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SENTINEL_API_KEY: ${SENTINEL_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ml-service:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.ml-service
    container_name: sentinel-ml-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      PORT: 8000

  dashboard:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.dashboard
    container_name: sentinel-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      - api-proxy

volumes:
  postgres_data:
  redis_data:
