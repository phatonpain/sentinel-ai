name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sentinel
          POSTGRES_PASSWORD: sentinel
          POSTGRES_DB: sentinel_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Generate Prisma Client
        run: pnpm db:generate
        env:
          DATABASE_URL: postgresql://sentinel:sentinel@localhost:5432/sentinel_test?schema=public

      - name: Run migrations
        run: pnpm db:migrate:dev
        env:
          DATABASE_URL: postgresql://sentinel:sentinel@localhost:5432/sentinel_test?schema=public

      - name: Test
        run: pnpm test
        env:
          DATABASE_URL: postgresql://sentinel:sentinel@localhost:5432/sentinel_test?schema=public
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-min-32-chars-long!!!
          SENTINEL_API_KEY: test-api-key

  build-images:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API Proxy image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./infrastructure/docker/Dockerfile.api-proxy
          push: false
          tags: sentinel-ai/api-proxy:latest

      - name: Build Dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./infrastructure/docker/Dockerfile.dashboard
          push: false
          tags: sentinel-ai/dashboard:latest

      - name: Build ML Service image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./infrastructure/docker/Dockerfile.ml-service
          push: false
          tags: sentinel-ai/ml-service:latest
